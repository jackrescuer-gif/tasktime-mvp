services:
  web:
    image: ${WEB_IMAGE:?WEB_IMAGE is required}:${IMAGE_TAG:?IMAGE_TAG is required}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${WEB_HTTP_PORT:-80}:80"

  backend:
    image: ${BACKEND_IMAGE:?BACKEND_IMAGE is required}:${IMAGE_TAG:?IMAGE_TAG is required}
    restart: unless-stopped
    env_file:
      - ./env/backend.production.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/api/ready').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tasktime}
      POSTGRES_USER: ${POSTGRES_USER:-tasktime}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tasktime} -d ${POSTGRES_DB:-tasktime}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # MCP-прокси (опционально, profile=mcp)
  # Запуск: docker compose --profile mcp up -d mcp-tasktime
  mcp-tasktime:
    image: evilfreelancer/openapi-to-mcp:latest
    profiles: ["mcp"]
    restart: unless-stopped
    environment:
      OPENAPI_URL: http://backend:3000/api/docs/json
      BACKEND_URL: http://backend:3000
      BEARER_TOKEN: ${MCP_SERVICE_TOKEN:-}
    ports:
      - "3002:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres-data:
  redis-data:
