services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tasktime
      POSTGRES_PASSWORD: tasktime
      POSTGRES_DB: tasktime
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tasktime"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # MCP-прокси для TaskTime API (openapi-to-mcp)
  # Запуск: docker compose --profile mcp up mcp-tasktime
  # Claude Desktop config: { "mcpServers": { "tasktime": { "url": "http://localhost:3002/mcp", "transport": "http" } } }
  mcp-tasktime:
    image: evilfreelancer/openapi-to-mcp:latest
    profiles: ["mcp"]
    environment:
      OPENAPI_URL: http://backend:3000/api/docs/json
      BACKEND_URL: http://backend:3000
      BEARER_TOKEN: ${MCP_SERVICE_TOKEN:-}
    ports:
      - "3002:3000"
    depends_on:
      - backend

volumes:
  pgdata:
