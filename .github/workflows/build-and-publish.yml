name: Build and Publish Images

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:
    inputs:
      image_tag:
        description: Optional custom image tag
        required: false
        type: string

permissions:
  contents: read
  packages: write

jobs:
  build:
    if: ${{ github.event_name != 'workflow_run' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main') }}
    runs-on: ubuntu-latest
    env:
      SOURCE_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
      SOURCE_BRANCH: ${{ github.event.workflow_run.head_branch || github.ref_name }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.SOURCE_SHA }}

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: vars
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.image_tag }}" ]; then
            PRIMARY_TAG="${{ github.event.inputs.image_tag }}"
          else
            PRIMARY_TAG="${SOURCE_SHA}"
          fi

          echo "primary_tag=${PRIMARY_TAG}" >> "$GITHUB_OUTPUT"

          {
            echo "backend_tags<<EOF"
            echo "ghcr.io/${{ github.repository_owner }}/tasktime-backend:${PRIMARY_TAG}"
            echo "ghcr.io/${{ github.repository_owner }}/tasktime-backend:${SOURCE_SHA}"
            if [ "${SOURCE_BRANCH}" = "main" ]; then
              echo "ghcr.io/${{ github.repository_owner }}/tasktime-backend:main"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          {
            echo "web_tags<<EOF"
            echo "ghcr.io/${{ github.repository_owner }}/tasktime-web:${PRIMARY_TAG}"
            echo "ghcr.io/${{ github.repository_owner }}/tasktime-web:${SOURCE_SHA}"
            if [ "${SOURCE_BRANCH}" = "main" ]; then
              echo "ghcr.io/${{ github.repository_owner }}/tasktime-web:main"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.vars.outputs.backend_tags }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: ${{ steps.vars.outputs.web_tags }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web
