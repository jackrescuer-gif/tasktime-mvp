name: Reset User Password (Production)

on:
  workflow_dispatch:
    inputs:
      email:
        description: 'User email'
        required: true
      password_hash:
        description: 'bcrypt hash of the new password'
        required: true

jobs:
  reset:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.PRODUCTION_DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.PRODUCTION_DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Upsert user password on production DB
        run: |
          HASH='${{ github.event.inputs.password_hash }}'
          EMAIL='${{ github.event.inputs.email }}'
          ssh "${{ secrets.PRODUCTION_DEPLOY_USER }}@${{ secrets.PRODUCTION_DEPLOY_HOST }}" \
            "docker exec \$(docker ps -qf 'name=postgres') psql -U postgres -d tasktime -c \
            \"INSERT INTO users (id, email, name, role, \\\"passwordHash\\\", \\\"createdAt\\\", \\\"updatedAt\\\") \
            VALUES (gen_random_uuid(), '${EMAIL}', '${EMAIL}', 'ADMIN', '${HASH}', NOW(), NOW()) \
            ON CONFLICT (email) DO UPDATE SET \\\"passwordHash\\\" = EXCLUDED.\\\"passwordHash\\\", \\\"updatedAt\\\" = NOW() \
            RETURNING email, role;\""
