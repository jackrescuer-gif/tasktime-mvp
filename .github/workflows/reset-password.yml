name: Reset User Password (Production)

on:
  workflow_dispatch:
    inputs:
      email:
        description: 'User email'
        required: true
      password_hash:
        description: 'bcrypt hash of the new password'
        required: true

jobs:
  reset:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.PRODUCTION_DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.PRODUCTION_DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Upsert user password on production DB
        env:
          HASH: ${{ github.event.inputs.password_hash }}
          EMAIL: ${{ github.event.inputs.email }}
          DEPLOY_PATH: ${{ secrets.PRODUCTION_DEPLOY_PATH }}
        run: |
          HASH_B64=$(printf '%s' "$HASH" | base64 -w0)
          EMAIL_B64=$(printf '%s' "$EMAIL" | base64 -w0)
          DEPLOY_PATH_B64=$(printf '%s' "$DEPLOY_PATH" | base64 -w0)
          ssh "${{ secrets.PRODUCTION_DEPLOY_USER }}@${{ secrets.PRODUCTION_DEPLOY_HOST }}" \
            bash -s "$EMAIL_B64" "$HASH_B64" "$DEPLOY_PATH_B64" << 'REMOTE'
          EMAIL=$(echo "$1" | base64 -d)
          HASH=$(echo "$2" | base64 -d)
          DEPLOY_PATH=$(echo "$3" | base64 -d)
          set -a; . "$DEPLOY_PATH/deploy/env/.env.production"; set +a
          SQL="INSERT INTO users (id, email, name, role, password_hash, is_active, created_at, updated_at) VALUES (gen_random_uuid(), '$EMAIL', '$EMAIL', 'ADMIN', '$HASH', true, NOW(), NOW()) ON CONFLICT (email) DO UPDATE SET password_hash = EXCLUDED.password_hash, is_active = true, updated_at = NOW() RETURNING email, role, is_active;"
          cd "$DEPLOY_PATH"
          docker compose --env-file deploy/env/.env.production -f deploy/docker-compose.production.yml exec -T postgres \
            psql -U "${POSTGRES_USER:-tasktime}" -d "${POSTGRES_DB:-tasktime}" -c "$SQL"
          REMOTE
