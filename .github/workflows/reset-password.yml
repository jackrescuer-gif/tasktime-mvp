name: Reset User Password (Production)

on:
  workflow_dispatch:
    inputs:
      email:
        description: 'User email'
        required: true
      password_hash:
        description: 'bcrypt hash of the new password'
        required: true

jobs:
  reset:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.PRODUCTION_DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.PRODUCTION_DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Upsert user password on production DB
        env:
          HASH: ${{ github.event.inputs.password_hash }}
          EMAIL: ${{ github.event.inputs.email }}
        run: |
          ssh "${{ secrets.PRODUCTION_DEPLOY_USER }}@${{ secrets.PRODUCTION_DEPLOY_HOST }}" bash -s << EOF
          set -a; . "${{ secrets.PRODUCTION_DEPLOY_PATH }}/deploy/env/.env.production"; set +a
          SQL="INSERT INTO users (id, email, name, role, \"passwordHash\", \"createdAt\", \"updatedAt\") VALUES (gen_random_uuid(), '${EMAIL}', '${EMAIL}', 'ADMIN', '${HASH}', NOW(), NOW()) ON CONFLICT (email) DO UPDATE SET \"passwordHash\" = EXCLUDED.\"passwordHash\", \"updatedAt\" = NOW() RETURNING email, role;"
          cd "${{ secrets.PRODUCTION_DEPLOY_PATH }}"
          docker compose --env-file deploy/env/.env.production -f deploy/docker-compose.production.yml exec -T postgres \
            psql -U "\${POSTGRES_USER:-tasktime}" -d "\${POSTGRES_DB:-tasktime}" -c "\$SQL"
          EOF
