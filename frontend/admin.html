<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskTime — Админ-панель</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
  <noscript><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"></noscript>
  <style>
    :root {
      --bg: #ffffff;
      --bg-secondary: #f8fafc;
      --bg-tertiary: #f1f5f9;
      --border: #e2e8f0;
      --text: #0f172a;
      --text-muted: #64748b;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --accent-light: #dbeafe;
      --success: #059669;
      --success-bg: #d1fae5;
      --warning: #d97706;
      --warning-bg: #fef3c7;
      --danger: #dc2626;
      --danger-bg: #fee2e2;
      --radius: 8px;
      --radius-lg: 12px;
      --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
      --shadow-lg: 0 4px 16px rgba(0,0,0,.08);
      --sidebar-w: 240px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-secondary);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }

    /* ——— Layout ——— */
    .layout { display: flex; min-height: 100vh; }

    /* ——— Sidebar ——— */
    .sidebar {
      width: var(--sidebar-w);
      background: var(--bg);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
      flex-shrink: 0;
    }

    .sidebar-header {
      padding: 20px 20px 16px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; margin-bottom: 4px; }
    .sidebar-logo-icon {
      width: 32px; height: 32px; border-radius: var(--radius);
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; color: #fff; flex-shrink: 0;
    }
    .sidebar-logo-text { font-size: 16px; font-weight: 700; color: var(--text); }
    .sidebar-subtitle { font-size: 11px; color: var(--text-muted); font-weight: 500; text-transform: uppercase; letter-spacing: .06em; margin-top: 4px; }

    .sidebar-nav { flex: 1; padding: 12px 10px; }
    .nav-section { margin-bottom: 20px; }
    .nav-section-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--text-muted); padding: 0 10px; margin-bottom: 4px; }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 10px; border-radius: var(--radius);
      font-size: 13px; font-weight: 500; color: var(--text-muted);
      cursor: pointer; border: none; background: none; width: 100%; text-align: left;
      transition: background .12s, color .12s;
    }
    .nav-item:hover { background: var(--bg-secondary); color: var(--text); }
    .nav-item.active { background: var(--accent-light); color: var(--accent); font-weight: 600; }
    .nav-item .nav-icon { font-size: 15px; width: 20px; text-align: center; flex-shrink: 0; }
    .nav-item .nav-badge {
      margin-left: auto; font-size: 10px; font-weight: 700;
      background: var(--danger); color: #fff;
      padding: 2px 6px; border-radius: 10px;
    }

    .sidebar-footer { padding: 14px; border-top: 1px solid var(--border); }
    .sidebar-user { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .sidebar-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #7c3aed);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; color: #fff; flex-shrink: 0;
    }
    .sidebar-user-info { min-width: 0; }
    .sidebar-user-name { font-size: 13px; font-weight: 600; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .sidebar-user-role { font-size: 11px; color: var(--text-muted); }
    .btn-back {
      display: flex; align-items: center; gap: 6px;
      width: 100%; padding: 7px 10px; border-radius: var(--radius);
      font-size: 13px; font-weight: 500; color: var(--text-muted);
      background: none; border: 1px solid var(--border); cursor: pointer;
      transition: all .12s;
    }
    .btn-back:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }

    /* ——— Main content ——— */
    .main { flex: 1; min-width: 0; display: flex; flex-direction: column; }

    .topbar {
      background: var(--bg); border-bottom: 1px solid var(--border);
      padding: 0 28px; height: 56px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 10;
    }
    .topbar-title { font-size: 16px; font-weight: 700; color: var(--text); }
    .topbar-breadcrumb { font-size: 13px; color: var(--text-muted); display: flex; align-items: center; gap: 6px; }
    .topbar-breadcrumb a { color: var(--accent); text-decoration: none; }
    .topbar-actions { display: flex; align-items: center; gap: 10px; }
    .refresh-btn {
      display: flex; align-items: center; gap: 6px; padding: 7px 14px;
      border-radius: var(--radius); font-size: 13px; font-weight: 500;
      background: var(--bg-secondary); border: 1px solid var(--border);
      cursor: pointer; color: var(--text); font-family: inherit;
      transition: background .12s;
    }
    .refresh-btn:hover { background: var(--bg-tertiary); }
    .refresh-icon { display: inline-block; transition: transform .3s; }
    .refresh-icon.spinning { animation: spin .6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ——— Content area ——— */
    .content { flex: 1; padding: 28px; }
    .page { display: none; }
    .page.active { display: block; }

    /* ——— Section header ——— */
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .section-title { font-size: 20px; font-weight: 700; }
    .section-subtitle { font-size: 13px; color: var(--text-muted); margin-top: 2px; }

    /* ——— Stat cards ——— */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .stat-card {
      background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-lg);
      padding: 20px; display: flex; align-items: flex-start; gap: 14px;
    }
    .stat-card-icon {
      width: 44px; height: 44px; border-radius: var(--radius); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: 20px;
    }
    .stat-card-icon.blue { background: var(--accent-light); }
    .stat-card-icon.green { background: var(--success-bg); }
    .stat-card-icon.yellow { background: var(--warning-bg); }
    .stat-card-icon.red { background: var(--danger-bg); }
    .stat-card-icon.purple { background: #ede9fe; }
    .stat-card-body { min-width: 0; }
    .stat-card-value { font-size: 26px; font-weight: 700; color: var(--text); line-height: 1.1; }
    .stat-card-label { font-size: 12px; color: var(--text-muted); margin-top: 3px; }
    .stat-card-sub { font-size: 11px; color: var(--text-muted); margin-top: 6px; font-family: 'DM Mono', monospace; }

    /* ——— Status indicator ——— */
    .status-indicator { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 500; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .status-dot.ok { background: var(--success); box-shadow: 0 0 0 3px rgba(5,150,105,.15); }
    .status-dot.error { background: var(--danger); box-shadow: 0 0 0 3px rgba(220,38,38,.15); }
    .status-dot.warn { background: var(--warning); box-shadow: 0 0 0 3px rgba(217,119,6,.15); }

    /* ——— Info panels ——— */
    .info-panels { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 24px; }
    @media (max-width: 1100px) { .info-panels { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 700px) { .info-panels { grid-template-columns: 1fr; } }
    .info-panel {
      background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden;
    }
    .info-panel-header {
      padding: 14px 18px; border-bottom: 1px solid var(--border);
      font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em;
      color: var(--text-muted); display: flex; align-items: center; gap: 8px;
    }
    .info-panel-body { padding: 4px 0; }
    .info-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 18px; font-size: 13px;
      border-bottom: 1px solid var(--border);
    }
    .info-row:last-child { border-bottom: none; }
    .info-row-label { color: var(--text-muted); }
    .info-row-value { font-weight: 600; color: var(--text); font-family: 'DM Mono', monospace; font-size: 12px; }

    /* ——— Progress bar ——— */
    .progress-wrap { display: flex; align-items: center; gap: 8px; }
    .progress-bar { flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 3px; transition: width .4s; }
    .progress-fill.blue { background: var(--accent); }
    .progress-fill.red { background: var(--danger); }
    .progress-fill.green { background: var(--success); }
    .progress-label { font-size: 11px; font-weight: 600; color: var(--text-muted); white-space: nowrap; }

    /* ——— Table ——— */
    .table-wrap { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
    .table-toolbar {
      padding: 14px 18px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    }
    .search-input {
      padding: 8px 12px; font-size: 13px; font-family: inherit;
      border: 1px solid var(--border); border-radius: var(--radius);
      background: var(--bg-secondary); color: var(--text);
      min-width: 220px; transition: border-color .15s;
    }
    .search-input:focus { outline: none; border-color: var(--accent); }
    .filter-select {
      padding: 8px 10px; font-size: 13px; font-family: inherit;
      border: 1px solid var(--border); border-radius: var(--radius);
      background: var(--bg-secondary); color: var(--text); cursor: pointer;
    }
    .table-scroll { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    th {
      padding: 10px 16px; text-align: left; font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .06em; color: var(--text-muted);
      background: var(--bg-secondary); border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    td { padding: 12px 16px; border-bottom: 1px solid var(--border); font-size: 13px; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--bg-secondary); }

    /* ——— Badges ——— */
    .badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 8px; border-radius: 12px; font-size: 11px; font-weight: 600;
      white-space: nowrap;
    }
    .badge-admin { background: #ede9fe; color: #5b21b6; }
    .badge-super-admin { background: linear-gradient(135deg, #ede9fe, #dbeafe); color: #3730a3; border: 1px solid #c4b5fd; }
    .badge-manager { background: #dbeafe; color: #1d4ed8; }
    .badge-cio { background: #fef3c7; color: #92400e; }
    .badge-user { background: var(--bg-secondary); color: var(--text-muted); border: 1px solid var(--border); }
    .badge-viewer { background: #f0fdf4; color: #166534; }
    .badge-ok { background: var(--success-bg); color: var(--success); }
    .badge-blocked { background: var(--danger-bg); color: var(--danger); }
    .badge-success { background: var(--success-bg); color: var(--success); }
    .badge-error { background: var(--danger-bg); color: var(--danger); }
    .badge-warning { background: var(--warning-bg); color: var(--warning); }
    .badge-info { background: var(--accent-light); color: var(--accent); }
    .badge-deploy { background: #f0fdf4; color: #166534; }

    /* ——— Action buttons ——— */
    .btn { display: inline-flex; align-items: center; gap: 5px; padding: 6px 12px; border-radius: var(--radius); font-size: 12px; font-weight: 500; font-family: inherit; border: none; cursor: pointer; transition: background .12s; }
    .btn:disabled { opacity: .4; cursor: not-allowed; }
    .btn-sm { padding: 4px 8px; font-size: 11px; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover:not(:disabled) { background: var(--accent-hover); }
    .btn-danger { background: var(--danger-bg); color: var(--danger); border: 1px solid #fca5a5; }
    .btn-danger:hover:not(:disabled) { background: var(--danger); color: #fff; }
    .btn-success { background: var(--success-bg); color: var(--success); border: 1px solid #6ee7b7; }
    .btn-success:hover:not(:disabled) { background: var(--success); color: #fff; }
    .btn-ghost { background: none; color: var(--text-muted); border: 1px solid var(--border); }
    .btn-ghost:hover:not(:disabled) { background: var(--bg-secondary); color: var(--text); }

    /* ——— Activity log ——— */
    .log-item {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 12px 18px; border-bottom: 1px solid var(--border);
    }
    .log-item:last-child { border-bottom: none; }
    .log-icon { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; margin-top: 1px; }
    .log-icon.info { background: var(--accent-light); }
    .log-icon.warning { background: var(--warning-bg); }
    .log-icon.error { background: var(--danger-bg); }
    .log-body { flex: 1; min-width: 0; }
    .log-action { font-size: 13px; font-weight: 500; color: var(--text); }
    .log-meta { font-size: 11px; color: var(--text-muted); margin-top: 3px; display: flex; gap: 10px; flex-wrap: wrap; }
    .log-time { font-size: 11px; color: var(--text-muted); white-space: nowrap; flex-shrink: 0; }
    .log-pagination { padding: 14px 18px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }

    /* ——— Deploy cards ——— */
    .deploy-list { display: flex; flex-direction: column; gap: 0; }
    .deploy-item {
      display: flex; align-items: flex-start; gap: 14px;
      padding: 16px 18px; border-bottom: 1px solid var(--border);
    }
    .deploy-item:last-child { border-bottom: none; }
    .deploy-timeline { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; }
    .deploy-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
    .deploy-dot.success { background: var(--success); }
    .deploy-dot.error { background: var(--danger); }
    .deploy-line { width: 2px; flex: 1; background: var(--border); margin: 4px 0; min-height: 20px; }
    .deploy-body { flex: 1; min-width: 0; }
    .deploy-header { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
    .deploy-title { font-size: 14px; font-weight: 600; }
    .deploy-time { font-size: 12px; color: var(--text-muted); }
    .deploy-summary { font-size: 12px; color: var(--text-muted); font-family: 'DM Mono', monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 4px; }

    /* ——— Empty state ——— */
    .empty { text-align: center; padding: 60px 20px; color: var(--text-muted); }
    .empty-icon { font-size: 40px; margin-bottom: 12px; opacity: .4; }
    .empty-text { font-size: 14px; }

    /* ——— Loader ——— */
    .loader { display: flex; align-items: center; justify-content: center; padding: 40px; }
    .spinner { width: 24px; height: 24px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }

    /* ——— Toast ——— */
    .toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
    .toast {
      padding: 12px 18px; border-radius: var(--radius); font-size: 13px; font-weight: 500;
      box-shadow: var(--shadow-lg); min-width: 220px; max-width: 360px;
      animation: slideIn .2s ease; display: flex; align-items: center; gap: 10px;
    }
    .toast.success { background: var(--success); color: #fff; }
    .toast.error { background: var(--danger); color: #fff; }
    @keyframes slideIn { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    /* ——— Modal ——— */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
    .modal-overlay.visible { display: flex; }
    .modal { background: var(--bg); border-radius: var(--radius-lg); box-shadow: var(--shadow-lg); width: 100%; max-width: 460px; }
    .modal-header { padding: 20px 24px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .modal-header h3 { font-size: 17px; font-weight: 700; }
    .modal-close { width: 30px; height: 30px; border: none; background: none; font-size: 18px; cursor: pointer; color: var(--text-muted); border-radius: var(--radius); display: flex; align-items: center; justify-content: center; }
    .modal-close:hover { background: var(--bg-secondary); }
    .modal-body { padding: 20px 24px; }
    .modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 10px; }
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 6px; }
    .form-select { width: 100%; padding: 9px 12px; font-size: 14px; font-family: inherit; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg); color: var(--text); cursor: pointer; }
    .form-select:focus { outline: none; border-color: var(--accent); }
  </style>
</head>
<body>
  <div class="layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <a href="/app" class="sidebar-logo">
          <div class="sidebar-logo-icon">⛨</div>
          <span class="sidebar-logo-text">TaskTime</span>
        </a>
        <div class="sidebar-subtitle">Панель управления</div>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-section">
          <div class="nav-section-label">Мониторинг</div>
          <button class="nav-item active" data-section="stats">
            <span class="nav-icon">◈</span>Статус системы
          </button>
        </div>
        <div class="nav-section">
          <div class="nav-section-label">Управление</div>
          <button class="nav-item" data-section="users">
            <span class="nav-icon">◑</span>Пользователи
          </button>
          <button class="nav-item" data-section="activity">
            <span class="nav-icon">◷</span>Активность
          </button>
          <button class="nav-item" data-section="deploys">
            <span class="nav-icon">⊞</span>Деплои
          </button>
        </div>
      </nav>

      <div class="sidebar-footer">
        <div class="sidebar-user">
          <div class="sidebar-avatar" id="sidebarAvatar">A</div>
          <div class="sidebar-user-info">
            <div class="sidebar-user-name" id="sidebarUserName">—</div>
            <div class="sidebar-user-role" id="sidebarUserRole">—</div>
          </div>
        </div>
        <button class="btn-back" onclick="window.location.href='/app'">
          ← Вернуться в приложение
        </button>
      </div>
    </aside>

    <!-- Main -->
    <div class="main">
      <div class="topbar">
        <div class="topbar-breadcrumb">
          <a href="/app">TaskTime</a>
          <span>›</span>
          <span id="topbarSection">Статус системы</span>
        </div>
        <div class="topbar-actions">
          <button class="refresh-btn" id="refreshBtn" onclick="refreshCurrentSection()">
            <span class="refresh-icon" id="refreshIcon">↻</span> Обновить
          </button>
        </div>
      </div>

      <div class="content">
        <!-- ——— Stats page ——— -->
        <div class="page active" id="page-stats">
          <div class="section-header">
            <div>
              <div class="section-title">Статус системы</div>
              <div class="section-subtitle" id="statsLastUpdated">Загрузка...</div>
            </div>
          </div>

          <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
              <div class="loader"><div class="spinner"></div></div>
            </div>
          </div>

          <div class="info-panels" id="infoPanels">
            <div class="loader"><div class="spinner"></div></div>
          </div>
        </div>

        <!-- ——— Users page ——— -->
        <div class="page" id="page-users">
          <div class="section-header">
            <div>
              <div class="section-title">Пользователи</div>
              <div class="section-subtitle" id="usersCount">Загрузка...</div>
            </div>
            <button class="btn btn-primary" id="inviteBtn" onclick="openRoleModal(null, true)" style="display:none">
              + Назначить роль
            </button>
          </div>
          <div class="table-wrap">
            <div class="table-toolbar">
              <input class="search-input" id="userSearch" type="text" placeholder="Поиск по имени или email…" oninput="filterUsers()">
              <select class="filter-select" id="roleFilter" onchange="filterUsers()">
                <option value="">Все роли</option>
                <option value="super-admin">super-admin</option>
                <option value="admin">admin</option>
                <option value="manager">manager</option>
                <option value="cio">cio</option>
                <option value="user">user</option>
                <option value="viewer">viewer</option>
              </select>
              <select class="filter-select" id="statusFilter" onchange="filterUsers()">
                <option value="">Все статусы</option>
                <option value="active">Активные</option>
                <option value="blocked">Заблокированные</option>
              </select>
            </div>
            <div class="table-scroll">

        <div class="page" id="page-deploys">
          <div class="section-header">
            <div>
              <div class="section-title">История деплоев</div>
              <div class="section-subtitle" id="deploysSubtitle">Загрузка...</div>
            </div>
          </div>

      </div>
    </div>
  </div>

  <!-- Toast container -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- Role edit modal -->
  <div class="modal-overlay" id="roleModal">
    <div class="modal">
      <div class="modal-header">
        <h3>Изменить роль</h3>
        <button class="modal-close" onclick="closeRoleModal()">✕</button>
      </div>
      <div class="modal-body">
        <div id="roleModalUserInfo" style="background:var(--bg-secondary);border-radius:var(--radius);padding:12px 14px;margin-bottom:16px;font-size:13px;"></div>
        <div class="form-group">
          <label class="form-label">Роль</label>
          <select class="form-select" id="roleModalSelect">
            <option value="user">user — обычный пользователь</option>
            <option value="viewer">viewer — только просмотр</option>
            <option value="manager">manager — менеджер</option>
            <option value="cio">cio — CIO (дашборд)</option>
            <option value="admin">admin — администратор</option>
            <option value="super-admin">super-admin — супер-администратор</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeRoleModal()">Отмена</button>
        <button class="btn btn-primary" id="roleModalSave" onclick="saveRole()">Сохранить</button>
      </div>
    </div>
  </div>

  <script>
    'use strict';

    const STORAGE_TOKEN = 'tasktime_token';
    const STORAGE_USER  = 'tasktime_user';

    let currentUser = null;
    let allUsers = [];
    let allActivity = [];
    let activityTotal = 0;
    let activityOffset = 0;
    const ACTIVITY_PAGE_SIZE = 50;
    let editingUserId = null;
    let currentSection = 'stats';

    function getToken() {
      return localStorage.getItem(STORAGE_TOKEN) || null;
    }

    async function apiFetch(url, opts = {}) {
      const token = getToken();
      const headers = { 'Content-Type': 'application/json', ...(opts.headers || {}) };
      if (token) headers['Authorization'] = `Bearer ${token}`;

      try {
        const r = await fetch(url, { ...opts, headers, credentials: 'include' });

        // Если Bearer-токен устарел — пробуем ещё раз только с кукой.
        // Это happens когда localStorage содержит старый токен, но кука ещё валидна.
        if (r.status === 401 && token) {
          const h2 = { 'Content-Type': 'application/json', ...(opts.headers || {}) };
          const r2 = await fetch(url, { ...opts, headers: h2, credentials: 'include' });
          if (r2.status === 401) {
            localStorage.removeItem(STORAGE_TOKEN);
            localStorage.removeItem(STORAGE_USER);
            window.location.href = '/';
            return null;
          }
          if (r2.status === 403) {
            const b = await r2.json().catch(() => ({}));
            showToast(b.error || 'Доступ запрещён', 'error');
            return null;
          }
          if (!r2.ok) {
            const b = await r2.json().catch(() => ({}));
            showToast(b.error || `HTTP ${r2.status}`, 'error');
            return null;
          }
          return r2.status === 204 ? true : await r2.json();
        }

        if (r.status === 401) {
          localStorage.removeItem(STORAGE_TOKEN);
          localStorage.removeItem(STORAGE_USER);
          window.location.href = '/';
          return null;
        }
        if (r.status === 403) {
          const body = await r.json().catch(() => ({}));
          showToast(body.error || 'Доступ запрещён', 'error');
          return null;
        }
        if (!r.ok) {
          const body = await r.json().catch(() => ({}));
          showToast(body.error || `HTTP ${r.status}`, 'error');
          return null;
        }
        return r.status === 204 ? true : await r.json();
      } catch (e) {
        showToast('Ошибка сети: ' + e.message, 'error');
        return null;
      }
    }

    // ——— Toast ———
    function showToast(message, type = 'success') {
      const container = document.getElementById('toastContainer');
      const el = document.createElement('div');
      el.className = `toast ${type}`;
      el.textContent = type === 'success' ? '✓ ' + message : '✕ ' + message;
      container.appendChild(el);
      setTimeout(() => el.remove(), 3500);
    }

    // ——— Navigation ———
    document.querySelectorAll('.nav-item').forEach(btn => {
      btn.addEventListener('click', function() {
        const section = this.dataset.section;
        switchSection(section);
      });
    });

    function switchSection(section) {
      currentSection = section;
      document.querySelectorAll('.nav-item').forEach(b => {
        b.classList.toggle('active', b.dataset.section === section);
      });
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById(`page-${section}`)?.classList.add('active');

      const titles = { stats: 'Статус системы', users: 'Пользователи', activity: 'Активность', deploys: 'Деплои' };
      document.getElementById('topbarSection').textContent = titles[section] || section;

      if (section === 'stats') loadStats();
      else if (section === 'users') loadUsers();
      else if (section === 'activity') loadActivity(0);
      else if (section === 'deploys') loadDeploys();
    }

    function refreshCurrentSection() {
      const icon = document.getElementById('refreshIcon');
      icon.classList.add('spinning');
      setTimeout(() => icon.classList.remove('spinning'), 700);
      switchSection(currentSection);
    }

    // ——— Format helpers ———
    function timeAgo(isoStr) {
      if (!isoStr) return '—';
      const diff = Date.now() - new Date(isoStr).getTime();
      const min = Math.floor(diff / 60000);
      if (min < 1) return 'только что';
      if (min < 60) return `${min} мин. назад`;
      const h = Math.floor(min / 60);
      if (h < 24) return `${h} ч. назад`;
      const d = Math.floor(h / 24);
      if (d < 30) return `${d} дн. назад`;
      return new Date(isoStr).toLocaleDateString('ru-RU', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    function fmtDate(isoStr) {
      if (!isoStr) return '—';
      return new Date(isoStr).toLocaleDateString('ru-RU', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    function fmtDateTime(isoStr) {
      if (!isoStr) return '—';
      return new Date(isoStr).toLocaleString('ru-RU', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
    }

    function roleBadge(role) {
      const map = {
        'super-admin': 'badge-super-admin',
        'admin': 'badge-admin',
        'manager': 'badge-manager',
        'cio': 'badge-cio',
        'user': 'badge-user',
        'viewer': 'badge-viewer',
      };
      return `<span class="badge ${map[role] || 'badge-user'}">${role}</span>`;
    }

    function levelIcon(level) {
      if (level === 'error') return '🔴';
      if (level === 'warning') return '🟡';
      if (level === 'trace') return '⚪';
      return '🔵';
    }

    function actionLabel(action) {
      const map = {
        'auth.login': 'Вход в систему',
        'auth.register': 'Регистрация',
        'auth.logout': 'Выход',
        'auth.impersonate': 'Имперсонация',
        'auth.blocked_login_attempt': 'Попытка входа заблокированным',
        'task.create': 'Создание задачи',
        'task.update': 'Обновление задачи',
        'task.delete': 'Удаление задачи',
        'task_item.created': 'Создание элемента',
        'task_item.updated': 'Обновление элемента',
        'task_item.deleted': 'Удаление элемента',
        'task_item.status_changed': 'Смена статуса',
        'time.start': 'Запуск таймера',
        'time.stop': 'Остановка таймера',
        'project.created': 'Создание проекта',
        'product_team.created': 'Создание команды',
        'admin.user_updated': 'Изменение пользователя (admin)',
      };
      return map[action] || action;
    }

    // ——— Load stats ———
    async function loadStats() {
      const data = await apiFetch('/api/admin/stats');
      if (!data) return;

      const now = new Date().toLocaleTimeString('ru-RU');
      document.getElementById('statsLastUpdated').textContent = `Обновлено в ${now}`;

      const memPct = data.system ? Math.round((1 - data.system.free_mem_mb / data.system.total_mem_mb) * 100) : 0;
      const heapPct = data.app ? Math.round(data.app.heap_used_mb / data.app.heap_total_mb * 100) : 0;

      document.getElementById('statsGrid').innerHTML = `
        <div class="stat-card">
          <div class="stat-card-icon blue">⏱</div>
          <div class="stat-card-body">
            <div class="stat-card-value">${data.app?.uptime_human || '—'}</div>
            <div class="stat-card-label">Аптайм приложения</div>
            <div class="stat-card-sub">${data.app?.node_version || ''} · ${data.app?.env || ''}</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-card-icon green">🖥</div>
          <div class="stat-card-body">
            <div class="stat-card-value">${data.system?.uptime_human || '—'}</div>
            <div class="stat-card-label">Аптайм сервера</div>
            <div class="stat-card-sub">${data.system?.platform || ''} · ${data.system?.cpu_count || 0} CPU</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-card-icon ${data.database?.status === 'ok' ? 'green' : 'red'}">🗄</div>
          <div class="stat-card-body">
            <div class="stat-card-value" style="font-size:18px;margin-top:4px">
              <span class="status-indicator">
                <span class="status-dot ${data.database?.status === 'ok' ? 'ok' : 'error'}"></span>
                ${data.database?.status === 'ok' ? 'Работает' : 'Ошибка'}
              </span>
            </div>
            <div class="stat-card-label">База данных</div>
            <div class="stat-card-sub">${data.database?.latency_ms != null ? `Задержка: ${data.database.latency_ms} мс` : 'недоступна'}</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-card-icon purple">👥</div>
          <div class="stat-card-body">
            <div class="stat-card-value">${data.database?.users ?? '—'}</div>
            <div class="stat-card-label">Пользователей</div>
            <div class="stat-card-sub">${data.database?.tasks ?? 0} задач в системе</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-card-icon ${(data.database?.errors_24h ?? 0) > 0 ? 'red' : 'green'}">⚠</div>
          <div class="stat-card-body">
            <div class="stat-card-value">${data.database?.errors_24h ?? '—'}</div>
            <div class="stat-card-label">Ошибок за 24 ч</div>
            <div class="stat-card-sub">${data.database?.audit_entries ?? 0} записей в audit log</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-card-icon yellow">💾</div>
          <div class="stat-card-body">
            <div class="stat-card-value">${data.app?.memory_mb ?? '—'} MB</div>
            <div class="stat-card-label">Память процесса (RSS)</div>
            <div class="stat-card-sub">Heap: ${data.app?.heap_used_mb ?? 0}/${data.app?.heap_total_mb ?? 0} MB</div>
          </div>
        </div>
      `;

      const loadAvg = data.system?.load_avg || [0, 0, 0];
      document.getElementById('infoPanels').innerHTML = `
        <div class="info-panel">
          <div class="info-panel-header">⚙ Приложение</div>
          <div class="info-panel-body">
            <div class="info-row"><span class="info-row-label">Node.js</span><span class="info-row-value">${data.app?.node_version || '—'}</span></div>
            <div class="info-row"><span class="info-row-label">Среда</span><span class="info-row-value">${data.app?.env || '—'}</span></div>
            <div class="info-row"><span class="info-row-label">Аптайм</span><span class="info-row-value">${data.app?.uptime_human || '—'}</span></div>
            <div class="info-row"><span class="info-row-label">Heap использовано</span>
              <span class="info-row-value">
                <div class="progress-wrap">
                  <div class="progress-bar" style="width:80px">
                    <div class="progress-fill ${heapPct > 80 ? 'red' : 'blue'}" style="width:${heapPct}%"></div>
                  </div>
                  <span class="progress-label">${heapPct}%</span>
                </div>
              </span>
            </div>
            <div class="info-row"><span class="info-row-label">RSS память</span><span class="info-row-value">${data.app?.memory_mb || 0} MB</span></div>
          </div>
        </div>
        <div class="info-panel">
          <div class="info-panel-header">🖥 Сервер</div>
          <div class="info-panel-body">
            <div class="info-row"><span class="info-row-label">Платформа</span><span class="info-row-value">${data.system?.platform || '—'}</span></div>
            <div class="info-row"><span class="info-row-label">CPU</span><span class="info-row-value">${data.system?.cpu_count || 0} ядер</span></div>
            <div class="info-row"><span class="info-row-label">Load avg</span><span class="info-row-value">${loadAvg.join(' / ')}</span></div>
            <div class="info-row"><span class="info-row-label">RAM свободно</span>
              <span class="info-row-value">
                <div class="progress-wrap">
                  <div class="progress-bar" style="width:80px">
                    <div class="progress-fill ${memPct > 85 ? 'red' : memPct > 70 ? 'blue' : 'green'}" style="width:${memPct}%"></div>
                  </div>
                  <span class="progress-label">${data.system?.free_mem_mb || 0}/${data.system?.total_mem_mb || 0} MB</span>
                </div>
              </span>
            </div>
            <div class="info-row"><span class="info-row-label">Аптайм</span><span class="info-row-value">${data.system?.uptime_human || '—'}</span></div>
          </div>
        </div>
        <div class="info-panel">
          <div class="info-panel-header">🗄 База данных</div>
          <div class="info-panel-body">
            <div class="info-row">
              <span class="info-row-label">Статус</span>
              <span class="info-row-value">
                <span class="status-indicator">
                  <span class="status-dot ${data.database?.status === 'ok' ? 'ok' : 'error'}"></span>
                  ${data.database?.status === 'ok' ? 'Подключена' : 'Ошибка'}
                </span>
              </span>
            </div>
            <div class="info-row"><span class="info-row-label">Задержка</span><span class="info-row-value">${data.database?.latency_ms ?? '—'} мс</span></div>
            <div class="info-row"><span class="info-row-label">Пользователи</span><span class="info-row-value">${data.database?.users ?? '—'}</span></div>
            <div class="info-row"><span class="info-row-label">Задачи</span><span class="info-row-value">${data.database?.tasks ?? '—'}</span></div>
            <div class="info-row"><span class="info-row-label">Audit-записей</span><span class="info-row-value">${data.database?.audit_entries ?? '—'}</span></div>
            <div class="info-row">
              <span class="info-row-label">Ошибок 24ч</span>
              <span class="info-row-value" style="color:${(data.database?.errors_24h ?? 0) > 0 ? 'var(--danger)' : 'var(--success)'}">
                ${data.database?.errors_24h ?? 0}
              </span>
            </div>
          </div>
        </div>
      `;
    }

    // ——— Load users ———
    async function loadUsers() {
      allUsers = await apiFetch('/api/admin/users') || [];
      renderUsers(allUsers);
      document.getElementById('usersCount').textContent = `${allUsers.length} пользователей`;
    }

    function filterUsers() {
      const q = document.getElementById('userSearch').value.toLowerCase();
      const role = document.getElementById('roleFilter').value;
      const status = document.getElementById('statusFilter').value;
      const filtered = allUsers.filter(u => {
        const matchQ = !q || u.name.toLowerCase().includes(q) || u.email.toLowerCase().includes(q);
        const matchRole = !role || u.role === role;
        const matchStatus = !status || (status === 'blocked' ? u.is_blocked : !u.is_blocked);
        return matchQ && matchRole && matchStatus;
      });
      renderUsers(filtered);
    }

    function renderUsers(users) {
      const isSuperAdmin = currentUser?.role === 'super-admin';
      const canManage = (target) => {
        if (target.id === currentUser?.id) return false;
        if ((target.role === 'admin' || target.role === 'super-admin') && !isSuperAdmin) return false;
        return true;
      };

      const tbody = document.getElementById('usersBody');
      if (!users.length) {
        tbody.innerHTML = '<tr><td colspan="7"><div class="empty"><div class="empty-icon">👤</div><div class="empty-text">Пользователи не найдены</div></div></td></tr>';
        return;
      }

      tbody.innerHTML = users.map(u => {
        const manageable = canManage(u);
        const initials = (u.name || u.email).slice(0, 2).toUpperCase();
        return `
          <tr>
            <td>
              <div style="display:flex;align-items:center;gap:10px">
                <div style="width:32px;height:32px;border-radius:50%;background:var(--accent-light);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--accent);flex-shrink:0">${initials}</div>
                <div>
                  <div style="font-weight:600;font-size:13px">${escHtml(u.name)}</div>
                  <div style="font-size:11px;color:var(--text-muted)">${escHtml(u.email)}</div>
                </div>
              </div>
            </td>
            <td>${roleBadge(u.role)}</td>
            <td>
              ${u.is_blocked
                ? '<span class="badge badge-blocked">⛔ Заблокирован</span>'
                : '<span class="badge badge-ok">✓ Активен</span>'}
              ${u.id === currentUser?.id ? '<span class="badge badge-info" style="margin-left:4px">Вы</span>' : ''}
            </td>
            <td style="font-size:12px;color:var(--text-muted)">${timeAgo(u.last_activity)}</td>
            <td style="font-family:'DM Mono',monospace;font-size:12px">${u.audit_actions ?? 0}</td>
            <td style="font-size:12px;color:var(--text-muted)">${fmtDate(u.created_at)}</td>
            <td>
              <div style="display:flex;gap:6px">
                ${manageable ? `
                  <button class="btn btn-sm btn-ghost" onclick="openRoleModal(${u.id})">✏ Роль</button>
                  ${u.is_blocked
                    ? `<button class="btn btn-sm btn-success" onclick="toggleBlock(${u.id}, false)">✓ Разблок.</button>`
                    : `<button class="btn btn-sm btn-danger" onclick="toggleBlock(${u.id}, true)">⛔ Блок.</button>`
                  }
                ` : '<span style="font-size:12px;color:var(--text-muted)">—</span>'}
              </div>
            </td>
          </tr>
        `;
      }).join('');
    }

    // ——— Role modal ———
    function openRoleModal(userId, fresh = false) {
      editingUserId = userId;
      const user = allUsers.find(u => u.id === userId);
      const infoEl = document.getElementById('roleModalUserInfo');
      if (user) {
        infoEl.innerHTML = `<b>${escHtml(user.name)}</b> &nbsp;<span style="color:var(--text-muted)">${escHtml(user.email)}</span>`;
        document.getElementById('roleModalSelect').value = user.role;
        // Hide super-admin option for non-super-admin
        const superOpt = document.querySelector('#roleModalSelect option[value="super-admin"]');
        if (superOpt) superOpt.style.display = currentUser?.role === 'super-admin' ? '' : 'none';
      } else {
        infoEl.textContent = '';
      }
      document.getElementById('roleModal').classList.add('visible');
    }

    function closeRoleModal() {
      document.getElementById('roleModal').classList.remove('visible');
      editingUserId = null;
    }

    async function saveRole() {
      if (!editingUserId) return;
      const role = document.getElementById('roleModalSelect').value;
      const btn = document.getElementById('roleModalSave');
      btn.disabled = true;
      const result = await apiFetch(`/api/admin/users/${editingUserId}`, {
        method: 'PATCH',
        body: JSON.stringify({ role }),
      });
      btn.disabled = false;
      if (result) {
        showToast('Роль изменена');
        closeRoleModal();
        await loadUsers();
        filterUsers();
      }
    }

    async function toggleBlock(userId, block) {
      const user = allUsers.find(u => u.id === userId);
      if (!user) return;
      const action = block ? 'заблокировать' : 'разблокировать';
      if (!confirm(`${action.charAt(0).toUpperCase() + action.slice(1)} пользователя ${user.name}?`)) return;
      const result = await apiFetch(`/api/admin/users/${userId}`, {
        method: 'PATCH',
        body: JSON.stringify({ is_blocked: block }),
      });
      if (result) {
        showToast(`Пользователь ${block ? 'заблокирован' : 'разблокирован'}`);
        await loadUsers();
        filterUsers();
      }
    }

    // ——— Load activity ———
    async function loadActivity(offset) {
      activityOffset = offset;
      const data = await apiFetch(`/api/admin/activity?limit=${ACTIVITY_PAGE_SIZE}&offset=${offset}`);
      if (!data) return;
      allActivity = data.items || [];
      activityTotal = data.total || 0;
      renderActivity();
    }

    function filterActivity() {
      renderActivity();
    }

    function renderActivity() {
      const q = document.getElementById('activitySearch').value.toLowerCase();
      const level = document.getElementById('activityLevelFilter').value;
      const filtered = allActivity.filter(item => {
        const matchQ = !q || item.action.toLowerCase().includes(q)
          || (item.user_name || '').toLowerCase().includes(q)
          || (item.user_email || '').toLowerCase().includes(q);
        const matchLevel = !level || item.level === level;
        return matchQ && matchLevel;
      });

      document.getElementById('activityCount').textContent =
        `${activityTotal} записей всего · страница ${Math.floor(activityOffset / ACTIVITY_PAGE_SIZE) + 1}`;

      const listEl = document.getElementById('activityList');
      if (!filtered.length) {
        listEl.innerHTML = '<div class="empty"><div class="empty-icon">📋</div><div class="empty-text">Нет записей</div></div>';
      } else {
        listEl.innerHTML = filtered.map(item => `
          <div class="log-item">
            <div class="log-icon ${item.level || 'info'}">${levelIcon(item.level)}</div>
            <div class="log-body">
              <div class="log-action">${escHtml(actionLabel(item.action))}</div>
              <div class="log-meta">
                ${item.user_name ? `<span>👤 ${escHtml(item.user_name)} (${escHtml(item.user_role || '')})</span>` : '<span>— система —</span>'}
                ${item.entity_type ? `<span>📁 ${escHtml(item.entity_type)} #${escHtml(item.entity_id || '')}</span>` : ''}
                ${item.ip ? `<span>🌐 ${escHtml(item.ip)}</span>` : ''}
                ${item.level !== 'info' ? `<span class="badge badge-${item.level === 'error' ? 'error' : 'warning'}">${item.level}</span>` : ''}
              </div>
            </div>
            <div class="log-time">${fmtDateTime(item.created_at)}</div>
          </div>
        `).join('');
      }

      const pagEl = document.getElementById('activityPagination');
      const infoEl = document.getElementById('activityPageInfo');
      const prevBtn = document.getElementById('activityPrevBtn');
      const nextBtn = document.getElementById('activityNextBtn');
      if (activityTotal > ACTIVITY_PAGE_SIZE) {
        pagEl.style.display = 'flex';
        const page = Math.floor(activityOffset / ACTIVITY_PAGE_SIZE) + 1;
        const totalPages = Math.ceil(activityTotal / ACTIVITY_PAGE_SIZE);
        infoEl.textContent = `${page} из ${totalPages}`;
        prevBtn.disabled = activityOffset === 0;
        nextBtn.disabled = activityOffset + ACTIVITY_PAGE_SIZE >= activityTotal;
      } else {
        pagEl.style.display = 'none';
      }
    }

    function activityPage(dir) {
      const newOffset = activityOffset + dir * ACTIVITY_PAGE_SIZE;
      if (newOffset < 0 || newOffset >= activityTotal) return;
      loadActivity(newOffset);
    }

    // ——— Load deploys ———
    async function loadDeploys() {
      const data = await apiFetch('/api/admin/deploys');
      const deploysEl = document.getElementById('deploysList');
      const subtitleEl = document.getElementById('deploysSubtitle');

      if (!data || !data.length) {
        subtitleEl.textContent = 'Нет данных о деплоях';
        deploysEl.innerHTML = `
          <div class="empty">
            <div class="empty-icon">🚀</div>
            <div class="empty-text">Лог деплоев не найден или пуст.<br>
              <span style="font-size:12px;color:var(--text-muted)">Путь: /var/log/tasktime-deploy.log</span>
            </div>
          </div>`;
        return;
      }

      subtitleEl.textContent = `${data.length} деплоев в истории`;
      deploysEl.innerHTML = `
        <div class="deploy-list">
          ${data.map((d, i) => `
            <div class="deploy-item">
              <div class="deploy-timeline">
                <div class="deploy-dot ${d.status || 'success'}"></div>
                ${i < data.length - 1 ? '<div class="deploy-line"></div>' : ''}
              </div>
              <div class="deploy-body">
                <div class="deploy-header">
                  <span class="deploy-title">Деплой #${d.id}</span>
                  <span class="badge badge-${d.status === 'error' ? 'error' : 'deploy'}">${d.status === 'error' ? '✕ Ошибка' : '✓ Успешно'}</span>
                </div>
                <div class="deploy-time">${fmtDateTime(d.started_at)}</div>
                ${d.summary ? `<div class="deploy-summary">${escHtml(d.summary)}</div>` : ''}
              </div>
            </div>
          `).join('')}
        </div>
      `;
    }

    // ——— Escape HTML ———
    function escHtml(str) {
      if (str == null) return '';
      return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    // ——— Init ———
    (async function init() {
      // Используем apiFetch (отправляет Bearer из localStorage).
      // Голый fetch без Bearer не работает на HTTP-окружении: кука Secure
      // не передаётся браузером по незащищённому соединению.
      const me = await apiFetch('/api/auth/me');
      if (!me) return; // apiFetch уже сделал редирект на '/' при 401
      currentUser = me;
      localStorage.setItem(STORAGE_USER, JSON.stringify(me));

      if (me.role !== 'admin' && me.role !== 'super-admin') {
        document.body.innerHTML = `
          <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:Inter,sans-serif">
            <div style="text-align:center;max-width:360px">
              <div style="font-size:48px;margin-bottom:16px">⛔</div>
              <div style="font-size:20px;font-weight:700;margin-bottom:8px">Доступ запрещён</div>
              <div style="font-size:14px;color:#64748b;margin-bottom:20px">Страница доступна только администраторам.</div>
              <a href="/app" style="color:#2563eb;font-size:14px">← Вернуться в приложение</a>
            </div>
          </div>
        `;
        return;
      }

      const roleLabels = { 'admin': 'Администратор', 'super-admin': 'Супер-администратор' };
      document.getElementById('sidebarUserName').textContent = me.name || me.email;
      document.getElementById('sidebarUserRole').textContent = roleLabels[me.role] || me.role;
      document.getElementById('sidebarAvatar').textContent = (me.name || me.email).slice(0, 2).toUpperCase();

      // Панель показана — теперь грузим данные асинхронно.
      // Не await: ошибка загрузки данных не должна убивать всю сессию.
      loadStats();
    })();
  </script>
</body>
</html>
