<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskTime — Вход</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
  <noscript><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"></noscript>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #fafafa;
      color: #172b4d;
      min-height: 100vh;
      line-height: 1.5;
    }
    .login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, #fafafa 0%, #ffffff 100%);
    }
    .login-card {
      width: 100%;
      max-width: 400px;
      padding: 40px;
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 4px 12px rgba(0,0,0,.1);
      border: 1px solid #e5e7eb;
    }
    .login-card h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
    .login-card p  { color: #6b778c; font-size: 14px; margin-bottom: 24px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; }
    input[type="email"],
    input[type="password"] {
      width: 100%; padding: 10px 12px; font-size: 14px; font-family: inherit;
      border: 1px solid #e5e7eb; border-radius: 8px;
      background: #ffffff; color: #172b4d; transition: border-color .15s;
    }
    input:focus { outline: none; border-color: #0052cc; box-shadow: 0 0 0 3px rgba(0,82,204,.15); }
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      width: 100%; padding: 10px 16px; font-size: 14px; font-weight: 500;
      font-family: inherit; border: none; border-radius: 8px;
      cursor: pointer; transition: background .15s, opacity .15s;
    }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .btn-primary { background: #0052cc; color: #fff; }
    .btn-primary:hover:not(:disabled) { background: #0043a6; }
    .login-error {
      display: none; color: #de350b; font-size: 13px; margin-bottom: 12px;
    }
    .blocked-box {
      display: none;
      margin-bottom: 20px;
      text-align: center;
    }
    .blocked-box img {
      width: 180px;
      border-radius: 12px;
      display: block;
      margin: 0 auto 10px;
    }
    .blocked-box p {
      font-size: 13px;
      color: #6b778c;
      margin: 0;
    }
    @media (max-width: 600px) { .login-card { padding: 24px; } }
  </style>
</head>
<body>
  <div class="login-screen">
    <div class="login-card">
      <div class="blocked-box" id="blockedBox">
        <img src="/okak.png" alt="окак">
        <p>Скачал HTML и думал, что всё увидишь? Окак.</p>
      </div>
      <h1>TaskTime</h1>
      <p>Войдите по email и паролю.</p>
      <form id="loginForm">
        <div class="form-group">
          <label for="loginEmail">Email</label>
          <input type="email" id="loginEmail" placeholder="alice@demo.com" required autocomplete="username">
        </div>
        <div class="form-group">
          <label for="loginPassword">Пароль</label>
          <input type="password" id="loginPassword" placeholder="••••••••" required autocomplete="current-password">
        </div>
        <p id="loginError" class="login-error"></p>
        <button type="submit" class="btn btn-primary" id="loginSubmit">Войти</button>
      </form>
    </div>
  </div>

  <script>
    (function () {
      const STORAGE_TOKEN = 'tasktime_token';
      const STORAGE_USER  = 'tasktime_user';

      if (new URLSearchParams(location.search).get('blocked') === '1') {
        document.getElementById('blockedBox').style.display = 'block';
        history.replaceState(null, '', '/');
      }

      document.getElementById('loginForm').addEventListener('submit', async function (e) {
        e.preventDefault();
        const email    = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;
        const errEl    = document.getElementById('loginError');
        const btn      = document.getElementById('loginSubmit');
        errEl.style.display = 'none';
        btn.disabled = true;
        try {
          const res  = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify({ email, password }),
          });
          const data = await res.json();
          if (data.token && data.user) {
            localStorage.setItem(STORAGE_TOKEN, data.token);
            localStorage.setItem(STORAGE_USER,  JSON.stringify(data.user));
            window.location.href = '/app';
          } else {
            errEl.textContent    = data.error || 'Ошибка входа';
            errEl.style.display  = 'block';
            btn.disabled = false;
          }
        } catch (_) {
          errEl.textContent   = 'Ошибка соединения с сервером';
          errEl.style.display = 'block';
          btn.disabled = false;
        }
      });
    })();
  </script>
</body>
</html>
